<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线考试系统 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>📚 在线考试系统</h1>
            <div class="login-tabs">
                <button class="tab-btn active" onclick="switchTab('student')">学生登录</button>
                <button class="tab-btn" onclick="switchTab('teacher')">教师登录</button>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="username" placeholder="请输入账号" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <div class="form-group" id="classSelect">
                    <label>选择班级</label>
                    <select id="classId">
                        <option value="">-- 请选择班级 --</option>
                    </select>
                </div>
                <button type="submit" class="btn-login">登录</button>
            </form>
            <div class="demo-accounts">
                <p>💡 演示账号：</p>
                <p>教师：teacher / 123456</p>
                <p>学生：student1 / 123456</p>
            </div>
        </div>
    </div>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
