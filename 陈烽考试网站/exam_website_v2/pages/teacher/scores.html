<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>成绩统计 - 教师端</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📚 在线考试系统</h2>
                <p>教师端</p>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">📊 工作台</a></li>
                <li><a href="exams.html">📝 考试管理</a></li>
                <li><a href="students.html">👨‍🎓 学生管理</a></li>
                <li><a href="classes.html">🏫 班级管理</a></li>
                <li><a href="scores.html" class="active">📈 成绩统计</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👨‍🏫</div>
                    <div class="user-details">
                        <p id="teacherName">教师</p>
                        <span>教师账号</span>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 退出登录</button>
            </div>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1>成绩统计</h1>
                <p>查看所有学生成绩</p>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="filter-bar">
                        <input type="text" id="searchScore" placeholder="🔍 搜索学生或考试..." oninput="loadScores()">
                        <select id="filterScoreClass" onchange="loadScores()"><option value="">全部班级</option></select>
                        <select id="filterScoreExam" onchange="loadScores()"><option value="">全部考试</option></select>
                    </div>
                </div>
                <table class="data-table">
                    <thead><tr><th>学生</th><th>考试</th><th>班级</th><th>得分</th><th>正确率</th><th>用时</th><th>提交时间</th></tr></thead>
                    <tbody id="scoresTable"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../../js/data.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/teacher-common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { initTeacherPage(); loadFilters(); loadScores(); });
        function loadFilters() {
            const classes = DataStore.get('classes');
            const exams = DataStore.get('exams');
            document.getElementById('filterScoreClass').innerHTML = '<option value="">全部班级</option>' + classes.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('filterScoreExam').innerHTML = '<option value="">全部考试</option>' + exams.map(e => `<option value="${e.title}">${e.title}</option>`).join('');
        }
        function loadScores() {
            let scores = DataStore.get('scores');
            const search = document.getElementById('searchScore').value.toLowerCase();
            const cls = document.getElementById('filterScoreClass').value;
            const exam = document.getElementById('filterScoreExam').value;
            if (search) scores = scores.filter(s => s.studentName.includes(search) || s.examTitle.includes(search));
            if (cls) scores = scores.filter(s => s.className === cls);
            if (exam) scores = scores.filter(s => s.examTitle === exam);
            document.getElementById('scoresTable').innerHTML = scores.map(s => {
                const rate = ((s.score / s.totalScore) * 100).toFixed(1);
                return `<tr><td>${s.studentName}</td><td>${s.examTitle}</td><td>${s.className}</td><td><strong style="color:${s.score>=60?'#2ecc71':'#e74c3c'}">${s.score}/${s.totalScore}</strong></td><td>${rate}%</td><td>${s.duration}分钟</td><td>${s.submitTime}</td></tr>`;
            }).join('') || '<tr><td colspan="7" style="text-align:center;color:#888;">暂无成绩数据</td></tr>';
        }
    </script>
</body>
</html>
