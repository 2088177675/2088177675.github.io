<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教师工作台 - 在线考试系统</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📚 在线考试系统</h2>
                <p>教师端</p>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="active">📊 工作台</a></li>
                <li><a href="exams.html">📝 考试管理</a></li>
                <li><a href="students.html">👨‍🎓 学生管理</a></li>
                <li><a href="classes.html">🏫 班级管理</a></li>
                <li><a href="scores.html">📈 成绩统计</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👨‍🏫</div>
                    <div class="user-details">
                        <p id="teacherName">教师</p>
                        <span>教师账号</span>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 退出登录</button>
            </div>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1>工作台</h1>
                <p>欢迎回来，以下是系统概览</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">📝</div>
                    <div class="stat-info"><h4 id="examCount">0</h4><p>已发布考试</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">👨‍🎓</div>
                    <div class="stat-info"><h4 id="studentCount">0</h4><p>学生总数</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">🏫</div>
                    <div class="stat-info"><h4 id="classCount">0</h4><p>班级数量</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">📊</div>
                    <div class="stat-info"><h4 id="scoreCount">0</h4><p>已批改试卷</p></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h3>📋 最近发布的考试</h3>
                    <a href="exams.html" class="btn btn-primary btn-sm">查看全部</a>
                </div>
                <table class="data-table">
                    <thead><tr><th>考试名称</th><th>班级</th><th>时长</th><th>总分</th><th>状态</th><th>发布时间</th></tr></thead>
                    <tbody id="recentExams"></tbody>
                </table>
            </div>
            <div class="card">
                <div class="card-header">
                    <h3>📈 最近提交的成绩</h3>
                    <a href="scores.html" class="btn btn-primary btn-sm">查看全部</a>
                </div>
                <table class="data-table">
                    <thead><tr><th>学生</th><th>考试</th><th>班级</th><th>得分</th><th>用时</th><th>提交时间</th></tr></thead>
                    <tbody id="recentScores"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../../js/data.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/teacher-common.js"></script>
    <script src="../../js/teacher-dashboard.js"></script>
</body>
</html>
