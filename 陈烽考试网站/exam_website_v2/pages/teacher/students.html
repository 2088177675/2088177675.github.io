<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生管理 - 教师端</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📚 在线考试系统</h2>
                <p>教师端</p>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">📊 工作台</a></li>
                <li><a href="exams.html">📝 考试管理</a></li>
                <li><a href="students.html" class="active">👨‍🎓 学生管理</a></li>
                <li><a href="classes.html">🏫 班级管理</a></li>
                <li><a href="scores.html">📈 成绩统计</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👨‍🏫</div>
                    <div class="user-details">
                        <p id="teacherName">教师</p>
                        <span>教师账号</span>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 退出登录</button>
            </div>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1>学生管理</h1>
                <p>管理学生信息</p>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="filter-bar">
                        <input type="text" id="searchStudent" placeholder="🔍 搜索姓名或账号..." oninput="loadStudents()">
                        <select id="filterStudentClass" onchange="loadStudents()"><option value="">全部班级</option></select>
                    </div>
                    <button class="btn btn-success" onclick="openStudentModal()">➕ 添加学生</button>
                </div>
                <table class="data-table">
                    <thead><tr><th>ID</th><th>姓名</th><th>账号</th><th>班级</th><th>操作</th></tr></thead>
                    <tbody id="studentsTable"></tbody>
                </table>
            </div>
        </main>
    </div>
    <div class="modal-overlay" id="studentModal">
        <div class="modal">
            <div class="modal-header">
                <h3>添加学生</h3>
                <button class="modal-close" onclick="closeStudentModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group"><label>姓名 *</label><input type="text" id="studentName" required></div>
                <div class="form-group"><label>账号 *</label><input type="text" id="studentUsername" required></div>
                <div class="form-group"><label>密码 *</label><input type="text" id="studentPassword" value="123456" required></div>
                <div class="form-group"><label>班级 *</label><select id="studentClass" required></select></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeStudentModal()">取消</button>
                <button class="btn btn-success" onclick="saveStudent()">保存</button>
            </div>
        </div>
    </div>
    <script src="../../js/data.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/teacher-common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { initTeacherPage(); loadClasses(); loadStudents(); });
        function loadClasses() {
            const classes = DataStore.get('classes');
            const opts = classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('filterStudentClass').innerHTML = '<option value="">全部班级</option>' + opts;
            document.getElementById('studentClass').innerHTML = '<option value="">--请选择--</option>' + opts;
        }
        function loadStudents() {
            let students = DataStore.get('students');
            const search = document.getElementById('searchStudent').value.toLowerCase();
            const cls = document.getElementById('filterStudentClass').value;
            if (search) students = students.filter(s => s.name.includes(search) || s.username.includes(search));
            if (cls) students = students.filter(s => s.classId == cls);
            document.getElementById('studentsTable').innerHTML = students.map(s => `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.username}</td><td>${s.className}</td><td><button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">删除</button></td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:#888;">暂无学生</td></tr>';
        }
        function openStudentModal() { document.getElementById('studentModal').classList.add('active'); }
        function closeStudentModal() { document.getElementById('studentModal').classList.remove('active'); }
        function saveStudent() {
            const name = document.getElementById('studentName').value;
            const username = document.getElementById('studentUsername').value;
            const password = document.getElementById('studentPassword').value;
            const classId = document.getElementById('studentClass').value;
            if (!name || !username || !password || !classId) { alert('请填写完整信息'); return; }
            const classes = DataStore.get('classes');
            const cls = classes.find(c => c.id == classId);
            const students = DataStore.get('students');
            students.push({ id: DataStore.generateId('students'), username, password, name, classId: parseInt(classId), className: cls.name });
            DataStore.set('students', students);
            showToast('学生添加成功'); closeStudentModal(); loadStudents();
        }
        function deleteStudent(id) {
            confirmAction('确定删除该学生？', () => {
                let students = DataStore.get('students'); students = students.filter(s => s.id !== id);
                DataStore.set('students', students); showToast('已删除'); loadStudents();
            });
        }
    </script>
</body>
</html>
