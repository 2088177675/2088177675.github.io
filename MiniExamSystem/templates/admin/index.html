{% extends "base.html" %}
{% block title %}管理员后台首页{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">系统总览</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin:30px 0;">
        <div style="background:#2563eb;color:white;padding:20px;border-radius:8px;text-align:center;">
            <div style="font-size:32px;font-weight:bold;">{{ total_user }}</div>
            <div>全部用户</div>
        </div>
        <div style="background:#10b981;color:white;padding:20px;border-radius:8px;text-align:center;">
            <div style="font-size:32px;font-weight:bold;">{{ admin_count }}</div>
            <div>管理员账号</div>
        </div>
        <div style="background:#f59e0b;color:white;padding:20px;border-radius:8px;text-align:center;">
            <div style="font-size:32px;font-weight:bold;">{{ teacher_count }}</div>
            <div>老师账号</div>
        </div>
        <div style="background:#ef4444;color:white;padding:20px;border-radius:8px;text-align:center;">
            <div style="font-size:32px;font-weight:bold;">{{ student_count }}</div>
            <div>学生账号</div>
        </div>
        <div style="background:#8b5cf6;color:white;padding:20px;border-radius:8px;text-align:center;">
            <div style="font-size:32px;font-weight:bold;">{{ exam_count }}</div>
            <div>全部考试场次</div>
        </div>
    </div>
    <div style="margin-top:20px;">
        <a href="{{ url_for('user_manage') }}">
            <button class="btn btn-primary">进入用户账号管理</button>
        </a>
    </div>
</div>
{% endblock %}
